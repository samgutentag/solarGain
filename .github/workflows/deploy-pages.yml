name: deploy-pages

on:
  push:
    branches: [main]
    paths: ['public/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Base path note: the site is plain static HTML with relative links only,
      # so it serves correctly both at /<repo-name>/ (default Pages URL) and at
      # / when public/CNAME sets a custom domain. No build step, no base path
      # rewriting needed.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
